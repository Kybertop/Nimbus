<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <title>Nimbus · Počasie</title>
    <style>html,body{background:#152040;background:linear-gradient(180deg,#0a1028 0%,#152040 100%) fixed;color:#fff;margin:0;min-height:100vh;min-height:100dvh;overscroll-behavior:none}</style>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://api.open-meteo.com">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css?v=20260420g">
</head>
<body>

<div id="skyScene"></div>

<div id="app">
    <div class="container">

        <header class="header">
            <div class="header-left">
                <i class="fa-solid fa-cloud-sun" style="font-size:20px;color:#fbbf24"></i>
                <span class="logo-text">Nimbus</span>
            </div>
            <div class="header-right">
                <span id="headerTime" class="header-time"></span>
                <button id="radarBtn" class="icon-btn desktop-only" title="Radar"><i class="fa-solid fa-satellite-dish" style="font-size:14px"></i></button>
                <button id="settingsBtn" class="icon-btn" title="Nastavenia"><i class="fa-solid fa-gear" style="font-size:14px"></i></button>
            </div>
        </header>

        <div style="position:relative;margin-bottom:8px">
            <div id="searchBar" class="search-bar">
                <i class="fa-solid fa-location-dot" style="font-size:13px;color:#34d399"></i>
                <input type="text" id="cityInput" class="search-input" placeholder="Hľadaj mesto…" autocomplete="off">
            </div>
            <div id="cityResults" class="city-results hidden"></div>
        </div>

        <div id="heroSection" class="hero">
            <div id="weatherLoading" class="hero-loading">
                <div class="spinner"></div>
                <p>Načítavam počasie…</p>
            </div>
            <div id="heroData" class="hero-data hidden">
                <div id="heroTemp" class="hero-temp">--°</div>
                <div id="heroDesc" class="hero-desc">Načítavam…</div>
                <div id="heroSub" class="hero-sub">Pocitová: --° H:--° L:--°</div>
            </div>
        </div>

        <div id="mainPanel" class="main-panel hidden">

            <div class="stats-grid" id="statsGrid"></div>

            <div class="tabs-section">
                <div class="tabs-row" id="tabsRow1"></div>
                <div class="tabs-row" id="tabsRow2"></div>
            </div>

            <div id="tabContent" class="tab-content">
                <div class="tab-loading hidden" id="tabLoading"><div class="spinner sm"></div></div>
                <div id="tabInner"></div>
            </div>
        </div>

        <div class="footer">Powered by Open-Meteo · Nimbus v3.0</div>

        <div id="devPanel" class="dev-panel hidden"></div>
    </div>
</div>

<button id="radarFab" class="radar-fab" title="Radar"><i class="fa-solid fa-satellite-dish"></i></button>

<div id="settingsOverlay" class="overlay hidden">
    <div class="overlay-bg" id="settingsClose"></div>
    <div class="settings-sheet" id="settingsSheet"></div>
</div>

<div id="radarOverlay" class="overlay hidden">
    <div class="radar-container">
        <iframe id="radarFrame" class="radar-frame" allowfullscreen></iframe>
        <div class="radar-city-label" id="radarCityLabel"></div>
        <button id="radarCloseBtn" class="radar-close"><i class="fa-solid fa-xmark"></i> Zavrieť</button>
        <div class="radar-legend">
            <div class="radar-legend-title" id="radarLegendTitle">Zrážky mm/h</div>
            <div class="radar-legend-bar" id="radarLegendBar"></div>
            <div class="radar-legend-labels" id="radarLegendLabels"></div>
        </div>
        <div class="radar-bottom-bar">
            <div class="radar-layers">
                <button class="radar-layer-btn active" data-layer="rain"><i class="fa-solid fa-cloud-rain" style="color:#38bdf8"></i> Zrážky</button>
                <button class="radar-layer-btn" data-layer="temp"><i class="fa-solid fa-temperature-half" style="color:#f87171"></i> Teplota</button>
                <button class="radar-layer-btn" data-layer="wind"><i class="fa-solid fa-wind" style="color:#a5b4fc"></i> Vietor</button>
                <button class="radar-layer-btn" data-layer="clouds"><i class="fa-solid fa-cloud" style="color:#94a3b8"></i> Oblaky</button>
                <button class="radar-layer-btn" data-layer="radar"><i class="fa-solid fa-satellite-dish" style="color:#60a5fa"></i> Radar</button>
                <button class="radar-layer-btn" data-layer="snowcover"><i class="fa-solid fa-snowflake" style="color:#93c5fd"></i> Sneh</button>
                <button class="radar-layer-btn" data-layer="pressure"><i class="fa-solid fa-gauge" style="color:#a78bfa"></i> Tlak</button>
                <button class="radar-layer-btn" data-layer="thunder"><i class="fa-solid fa-cloud-bolt" style="color:#fbbf24"></i> Búrky</button>
            </div>
        </div>
    </div>
</div>

<script src="sky.js?v=20260420g"></script>
<script src="app.js?v=20260420g"></script>
</body>
</html>
