<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>Nimbus Color Test</title></head>
<body style="background:#060a12;color:white;font-family:Inter,sans-serif;padding:40px">
<h2>Color contrast test — which cards can you see?</h2>
<div style="display:flex;gap:20px;margin-top:30px;flex-wrap:wrap">
<div style="background:#1e293b;border:1px solid #475569;padding:30px;border-radius:12px;width:200px"><b>Card A</b><br>#1e293b (my current)</div>
<div style="background:#2d3a4f;border:1px solid #5a7090;padding:30px;border-radius:12px;width:200px"><b>Card B</b><br>#2d3a4f (lighter)</div>
<div style="background:#1a2332;border:2px solid #4a90d9;padding:30px;border-radius:12px;width:200px"><b>Card C</b><br>Dark + blue border</div>
<div style="background:#192231;border:1px solid #2a5a8a;padding:30px;border-radius:12px;width:200px;box-shadow:0 0 15px rgba(50,100,180,0.3)"><b>Card D</b><br>Dark + blue glow</div>
<div style="background:rgba(20,30,50,0.85);backdrop-filter:blur(20px);border:1px solid rgba(100,150,220,0.25);padding:30px;border-radius:12px;width:200px"><b>Card E</b><br>Glass + blue tint border</div>
</div>
</body></html>
